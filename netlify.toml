[build]
  publish = "exampleSite/public"
  command = "cd exampleSite && hugo --themesDir ../.."

[build.environment]
  HUGO_VERSION = "0.160.1"
  HUGO_THEME = "repo"
  HUGO_BASEURL = "https://gazikabas.netlify.app"

[[headers]]
  for = "/*"
    [headers.values]
      Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/*"
  to = "https://gkabas.github.io/:splat"
  status = 301
  force = true
